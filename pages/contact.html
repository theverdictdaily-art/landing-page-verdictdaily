<style>
.form-box {
    background:white;
    padding:30px;
    border-radius:10px;
    border:1px solid #eee;
    max-width:600px;
    margin:auto;
}

.form-box input,
.form-box textarea {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

.form-box textarea {
    min-height:120px;
}

.form-box button {
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#2e9e5b;
    color:white;
    border:none;
    border-radius:5px;
    font-size:15px;
    cursor:pointer;
}

.form-box button:hover {
    opacity:0.9;
}
</style>

<h2>Send us a message</h2>

<form>

<input type="email" placeholder="Your Email" required>
